<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://img.icons8.com/?size=100&id=XnHBz2LnhELw&format=png&color=000000" type="image/x-icon">
    <script src="https://kit.fontawesome.com/90bf4f9655.js" crossorigin="anonymous"></script>
</head>
<body>
    
    <main>
        <nav>
            <h1>Productivity Dashboard</h1>
            <i class="fa-solid fa-circle-half-stroke"></i>
        </nav>
        <section class="dashboard">
            <div class="date"></div>
            <div class="weather"></div>
        </section>
        <section id="todo" class="cards">
            <div class="feature-card">
                <img src="https://img.icons8.com/?size=100&id=40318&format=png&color=000000" alt="todo logo">
                <h1>Todo</h1>
                <p>Add Manage and Complete your Daily Task</p>
                <button>Open</button>
            </div>
            <div id="planner" class="feature-card">
                <img src="https://img.icons8.com/?size=100&id=13543&format=png&color=000000" alt="daily planner logo">
                <h1>Daily Planner</h1>
                <p>Plan your Day by time slots and stay on track</p>
                <button>Open</button>
            </div>
            <div id="goals" class="feature-card">
                <img src="https://img.icons8.com/?size=100&id=63765&format=png&color=000000" alt="daily goals logo">
                <h1>Daily Goals</h1>
                <p>Set your Goals and Track your Progress</p>
                <button>Open</button>
            </div>
            <div id="pomodomo" class="feature-card">
                <img src="https://img.icons8.com/?size=100&id=63256&format=png&color=000000" alt="pomodomo logo">
                <h1>PomoDomo</h1>
                <p>Focus Better With Pomodomo Technique</p>
                <button>Open</button>
            </div>
            <div id="quotes" class="feature-card">
                <img src="https://img.icons8.com/?size=100&id=Gu5nwNOC8UZL&format=png&color=000000" alt="quotes logo">
                <h1>Quotes</h1>
                <p>Get Inspired with powerful Quotes</p>
                <button>Open</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
